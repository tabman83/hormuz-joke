<div style="text-align: center; margin-top: 20vh; font-family: 'Helvetica', sans-serif;">
  <p style="font-size: 1.2rem; letter-spacing: 3px; color: #666; font-weight: bold;">IS HORMUZ OPEN TODAY ?</p>
  <h1 id="status" style="font-size: 8rem; font-weight: 900; margin: 20px 0; line-height: 1;">---</h1>
  <p id="timestamp" style="font-size: 1rem; color: #999; margin-bottom: 40px;"></p>
  
  <hr style="width: 50px; border: 1px solid #eee; margin: 40px auto;">

  <div style="margin-top: 30px;">
    <a href="https://www.buymeacoffee.com/YOUR_LINK" target="_blank" 
       style="background: #000; color: #fff; padding: 15px 30px; text-decoration: none; border-radius: 5px; font-weight: bold;">
       🚢 DONATE TO THE MINESWEEPER FUND
    </a>
  </div>
  <p style="font-size: 0.8rem; color: #ccc; margin-top: 60px; max-width: 400px; margin-left: auto; margin-right: auto;">
    DISCLAIMER: Transit status is determined by proprietary algorithmic coin-toss. Not for navigational use.
  </p>
</div>

<script>
  const statusEl = document.getElementById("status");
  const outcomes = ["OPEN", "CLOSED"];
  const colors = ["#1a1a1a", "#d00000"]; // Black for Open, Serious Red for Closed
  
  const roll = Math.floor(Math.random() * outcomes.length);
  statusEl.innerText = outcomes[roll];
  statusEl.style.color = colors[roll];

  // Set fake "Live" timestamp
  const now = new Date();
  document.getElementById("timestamp").innerText = "INTEL VERIFIED: " + now.toLocaleTimeString();
</script>
